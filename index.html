<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <span>CampusChat</span>
        </div>
        <nav id="mainNav">
            <a href="#" data-page="chat" class="nav-link"><i class="fas fa-comment-dots"></i><span>Chat</span></a>
            <a href="#" data-page="devs" class="nav-link"><i class="fas fa-users"></i><span>Devs</span></a>
            <a href="#" data-page="techs" class="nav-link"><i class="fas fa-microchip"></i><span>Techs</span></a>
        </nav>
        <div class="header-right">
            <span id="userInfo" style="display:none;"></span>
            <button id="logoutBtn" style="display:none;"><i class="fas fa-sign-out-alt"></i></button>
            <button class="hamburger" id="hamburger"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <div class="mobile-nav" id="mobileNav">
        <a href="#" data-page="chat" class="mobile-nav-link"><i class="fas fa-comment-dots"></i> Chat</a>
        <a href="#" data-page="devs" class="mobile-nav-link"><i class="fas fa-users"></i> Devs</a>
        <a href="#" data-page="techs" class="mobile-nav-link"><i class="fas fa-microchip"></i> Techs</a>
        <a href="#" data-page="profile" class="mobile-nav-link"><i class="fas fa-user"></i> Perfil</a>
    </div>

    <main id="main-content"></main>

    <footer>
        <div class="footer-left">
            <div class="footer-logo">IFRN</div>
            <span>Campus Santa Cruz</span>
        </div>
        <div class="footer-center">
            <p>Programação para Internet</p>
            <p>Prof. Marcelo Figueiredo Barbosa Júnior</p>
        </div>
        <div class="footer-right">
            <span>© 2025</span>
        </div>
    </footer>

    <!-- Modais -->
    <div id="mediaModal" class="modal-overlay" style="display:none;">
        <div class="modal-content media-modal">
            <button class="modal-close" id="closeMediaModal"><i class="fas fa-times"></i></button>
            <img id="modalImage" src="" alt="" style="display:none; max-width:100%; max-height:80vh; border-radius:12px;">
            <video id="modalVideo" controls style="display:none; max-width:100%; max-height:80vh; border-radius:12px;"></video>
        </div>
    </div>

    <div id="gifModal" class="modal-overlay" style="display:none;">
        <div class="modal-content gif-modal">
            <div class="gif-modal-header">
                <h3>Escolher GIF</h3>
                <button class="modal-close" id="closeGifModal"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="gifSearch" placeholder="Buscar GIF..." class="gif-search-input">
            <div id="gifGrid" class="gif-grid"></div>
        </div>
    </div>

    <div id="emojiModal" class="emoji-picker" style="display:none;">
        <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
